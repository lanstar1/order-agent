databases:
  - name: order-agent-db
    plan: free

services:
  - type: web
    name: order-agent
    runtime: python
    buildCommand: pip install -r backend/requirements.txt python-dotenv && playwright install chromium --with-deps
    startCommand: cd backend && python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: order-agent-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: ERP_COM_CODE
        sync: false
      - key: ERP_USER_ID
        sync: false
      - key: ERP_ZONE
        sync: false
      - key: ERP_API_KEY
        sync: false
      - key: ERP_WH_CD
        sync: false
      - key: DEBUG
        value: "false"
      - key: LOGEN_YONGSAN_ID
        sync: false
      - key: LOGEN_YONGSAN_PW
        sync: false
      - key: LOGEN_GIMPO_ID
        sync: false
      - key: LOGEN_GIMPO_PW
        sync: false
      - key: AICC_DATA_DIR
        value: "../data/aicc"
      - key: SECRET_KEY
        sync: false
      - key: GODOMALL_MALL_ID
        sync: false
      - key: GODOMALL_API_KEY
        sync: false
