databases:
  - name: order-agent-db
    plan: free

services:
  - type: web
    name: order-agent
    runtime: python
    buildCommand: pip install -r backend/requirements.txt python-dotenv && playwright install chromium --with-deps
    startCommand: cd backend && python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: order-agent-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: ERP_COM_CODE
        sync: false
      - key: ERP_USER_ID
        sync: false
      - key: ERP_ZONE
        sync: false
      - key: ERP_API_KEY
        sync: false
      - key: ERP_WH_CD
        sync: false
      - key: ERP_WEB_USER_ID
        sync: false
      - key: ERP_WEB_USER_PW
        sync: false
      - key: DEBUG
        value: "false"
      - key: LOGEN_YONGSAN_ID
        sync: false
      - key: LOGEN_YONGSAN_PW
        sync: false
      - key: LOGEN_GIMPO_ID
        sync: false
      - key: LOGEN_GIMPO_PW
        sync: false
      - key: AICC_DATA_DIR
        value: "../data/aicc"
      - key: SECRET_KEY
        sync: false
      - key: GODOMALL_PARTNER_KEY
        sync: false
      - key: GODOMALL_USER_KEY
        sync: false
      - key: SA_MONTHLY_BUDGET
        value: "50.0"
      - key: SA_MAX_CONCURRENT
        value: "6"
      # ── 신제품 소싱 모듈 (v0.3.0) ──
      - key: YOUTUBE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: NAVER_SEARCH_CLIENT_ID
        sync: false
      - key: NAVER_SEARCH_CLIENT_SECRET
        sync: false
      - key: NAVER_AD_API_KEY
        sync: false
      - key: NAVER_AD_CUSTOMER_ID
        sync: false
      - key: NAVER_AD_SECRET_KEY
        sync: false
      - key: SOURCING_SLACK_WEBHOOK
        sync: false
      - key: SOURCING_POLL_INTERVAL_HOURS
        value: "3"
