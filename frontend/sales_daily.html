<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일별 판매 현황</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080E1C; --surface:#0F1828; --surface2:#162034; --surface3:#1C2840;
  --border:#1E2E44; --border2:#243650;
  --accent:#00D4CC; --accent-dim:#007A76; --accent-glow:rgba(0,212,204,0.15);
  --text:#D8EAF5; --text2:#6A8FAD; --text3:#3E5F80;
  --success:#00C27A; --danger:#FF4757; --warning:#FFB020; --info:#3B9EEB;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:48px 48px;opacity:0.35;}

header{position:relative;z-index:10;background:var(--surface);border-bottom:1px solid var(--border2);padding:0 28px;display:flex;align-items:center;gap:0;height:52px;}
.header-accent{width:4px;height:36px;background:linear-gradient(180deg,var(--accent),var(--accent-dim));border-radius:2px;margin-right:16px;flex-shrink:0;}
.header-title{font-size:15px;font-weight:700;letter-spacing:0.02em;color:var(--text);}
.header-sub{font-size:11px;color:var(--text3);margin-left:10px;}

.wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:24px 20px;}

/* ── 날짜 컨트롤 ── */
.ctrl-bar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.ctrl-bar label{font-size:12px;color:var(--text2);font-weight:600;}
.ctrl-bar input[type=date]{
  background:var(--surface2);border:1px solid var(--border2);border-radius:8px;
  color:var(--text);padding:7px 12px;font-size:13px;font-family:inherit;outline:none;
  colorscheme:dark;
}
.ctrl-bar input[type=date]:focus{border-color:var(--accent);}
.btn-load{
  background:var(--accent);color:#000;border:none;border-radius:8px;
  padding:8px 20px;font-size:13px;font-weight:700;cursor:pointer;
  transition:opacity .15s;
}
.btn-load:hover{opacity:.85;}
.btn-load:disabled{opacity:.4;cursor:not-allowed;}
.btn-collect{
  background:var(--surface2);color:var(--warning);
  border:1px solid rgba(255,176,32,.4);border-radius:8px;
  padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;
  transition:all .15s;display:flex;align-items:center;gap:6px;margin-left:auto;
}
.btn-collect:hover{background:rgba(255,176,32,.1);border-color:var(--warning);}
.btn-collect:disabled{opacity:.4;cursor:not-allowed;}
.collect-status{
  font-size:12px;padding:6px 14px;border-radius:8px;
  background:rgba(0,212,204,.08);border:1px solid rgba(0,212,204,.25);
  color:var(--accent);display:none;align-items:center;gap:6px;
}
.collect-status.show{display:flex;}
.mini-spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(0,212,204,.3);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}

/* ── 날짜 헤더 ── */
.date-header{
  display:flex;align-items:center;gap:16px;margin-bottom:20px;
  padding:12px 18px;background:var(--surface);border:1px solid var(--border2);border-radius:10px;
}
.date-tag{font-size:12px;font-weight:700;padding:3px 10px;border-radius:6px;}
.date-tag.today{background:rgba(0,212,204,.15);color:var(--accent);}
.date-tag.prev{background:rgba(106,143,173,.1);color:var(--text2);}
.date-sep{color:var(--text3);font-size:18px;}

/* ── 요약 chips ── */
.summary-row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.s-chip{
  padding:8px 16px;border-radius:10px;border:1px solid;font-size:12px;font-weight:600;
  display:flex;flex-direction:column;gap:2px;min-width:110px;
}
.s-chip .s-label{font-size:10px;opacity:.7;}
.s-chip .s-val{font-size:18px;font-weight:800;}
.s-chip .s-diff{font-size:11px;}
.chip-total{background:rgba(59,158,235,.08);border-color:rgba(59,158,235,.3);color:var(--info);}
.chip-up   {background:rgba(0,194,122,.08);border-color:rgba(0,194,122,.3);color:var(--success);}
.chip-down {background:rgba(255,71,87,.08);border-color:rgba(255,71,87,.3);color:var(--danger);}
.chip-same {background:rgba(106,143,173,.08);border-color:rgba(106,143,173,.2);color:var(--text2);}

/* ── 거래처 카드 ── */
.customer-grid{display:flex;flex-direction:column;gap:14px;}
.c-card{
  background:var(--surface);border:1px solid var(--border2);border-radius:12px;overflow:hidden;
  transition:border-color .2s;
}
.c-card:hover{border-color:var(--border2);}
.c-header{
  display:flex;align-items:center;gap:12px;padding:14px 18px;
  cursor:pointer;user-select:none;
  border-bottom:1px solid transparent;transition:border-color .2s;
}
.c-card.open .c-header{border-bottom-color:var(--border);}
.c-name{font-size:14px;font-weight:700;flex:1;}
.c-stats{display:flex;gap:16px;align-items:center;}
.c-stat{text-align:center;}
.c-stat .s-l{font-size:10px;color:var(--text3);}
.c-stat .s-v{font-size:15px;font-weight:800;}
.c-stat .today-v{color:var(--accent);}
.c-stat .prev-v{color:var(--text2);}
.diff-badge{
  padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;
}
.diff-up  {background:rgba(0,194,122,.15);color:var(--success);}
.diff-down{background:rgba(255,71,87,.15);color:var(--danger);}
.diff-same{background:rgba(106,143,173,.1);color:var(--text3);}
.c-arrow{font-size:12px;color:var(--text3);transition:transform .2s;}
.c-card.open .c-arrow{transform:rotate(90deg);}

/* ── 품목 테이블 ── */
.c-body{display:none;padding:0 18px 14px;}
.c-card.open .c-body{display:block;}
.item-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px;}
.item-table th{color:var(--text3);font-weight:600;padding:5px 8px;border-bottom:1px solid var(--border);text-align:left;}
.item-table td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.03);color:var(--text);}
.item-table tr:last-child td{border-bottom:none;}
.item-table td.num{text-align:right;font-family:'JetBrains Mono',monospace;}
.item-table td.code{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);}
.td-today{color:var(--accent);font-weight:700;}
.td-prev{color:var(--text2);}
.td-diff-up  {color:var(--success);font-weight:700;}
.td-diff-down{color:var(--danger);font-weight:700;}
.td-diff-same{color:var(--text3);}

/* ── 빈 상태 ── */
.empty{text-align:center;padding:60px 20px;color:var(--text3);}
.empty .e-icon{font-size:40px;margin-bottom:12px;}
.empty p{font-size:13px;}

/* ── 로딩 ── */
.loading{text-align:center;padding:40px;color:var(--text2);}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── 데이터 없음 안내 ── */
.no-data-hint{
  padding:18px;background:rgba(255,176,32,.06);border:1px solid rgba(255,176,32,.2);
  border-radius:10px;margin-bottom:20px;font-size:12px;color:var(--warning);
  display:none;
}
</style>
</head>
<body>

<header>
  <div class="header-accent"></div>
  <span class="header-title">📊 일별 판매 현황</span>
  <span class="header-sub">거래처별 전일대비 판매수량</span>
</header>

<div class="wrap">

  <!-- 날짜 선택 -->
  <div class="ctrl-bar">
    <label>조회 날짜</label>
    <input type="date" id="dateInput">
    <button class="btn-load" id="loadBtn" onclick="loadData()">조회</button>
    <button class="btn-load" style="background:var(--surface2);color:var(--text2);border:1px solid var(--border2);" onclick="goToday()">오늘</button>
    <button class="btn-collect" id="collectBtn" onclick="fetchEcount()">
      <span id="collectIcon">⚡</span> 이카운트 자동 수집
    </button>
    <span class="collect-status" id="collectStatus">
      <span class="mini-spinner"></span> 수집 중...
    </span>
  </div>

  <!-- ERP 데이터 없음 안내 -->
  <div class="no-data-hint" id="noDataHint">
    ⚠ 해당 날짜의 판매 데이터가 없습니다. 아래 <strong>이카운트 자동 수집</strong> 버튼을 눌러 데이터를 가져오세요.
  </div>

  <!-- 날짜 헤더 -->
  <div class="date-header" id="dateHeader" style="display:none;">
    <span class="date-tag prev" id="prevDateTag"></span>
    <span class="date-sep">→</span>
    <span class="date-tag today" id="todayDateTag"></span>
    <span style="font-size:11px;color:var(--text3);margin-left:auto;">클릭하면 품목 상세 펼침</span>
  </div>

  <!-- 요약 -->
  <div class="summary-row" id="summaryRow"></div>

  <!-- 로딩 -->
  <div class="loading" id="loadingDiv" style="display:none;">
    <div class="spinner"></div>
    <div>데이터 불러오는 중...</div>
  </div>

  <!-- 거래처 카드 목록 -->
  <div class="customer-grid" id="customerGrid"></div>

  <!-- 빈 상태 -->
  <div class="empty" id="emptyDiv" style="display:none;">
    <div class="e-icon">📭</div>
    <p>판매 데이터가 없습니다.</p>
  </div>

</div>

<script>
const API_BASE = "/api/sales";

// ── 인증 토큰 ──
function getToken() {
  return localStorage.getItem("jwt_token") || "";
}
function authHeaders() {
  const t = getToken();
  return t ? { "Authorization": `Bearer ${t}` } : {};
}

// 미로그인 시 메인으로 리다이렉트
window.addEventListener("DOMContentLoaded", () => {
  if (!getToken()) {
    alert("로그인이 필요합니다.");
    window.location.href = "/";
    return;
  }
  document.getElementById("dateInput").value = todayStr();
  loadData();
});

function todayStr() {
  return new Date().toLocaleDateString("sv-SE"); // YYYY-MM-DD
}

function fmtDate(d) {
  if (!d) return "";
  const [y, m, day] = d.split("-");
  return `${y}.${m}.${day}`;
}

function diffText(diff) {
  if (diff > 0) return `<span class="diff-badge diff-up">▲ ${diff}</span>`;
  if (diff < 0) return `<span class="diff-badge diff-down">▼ ${Math.abs(diff)}</span>`;
  return `<span class="diff-badge diff-same">— 0</span>`;
}

function diffClass(diff) {
  if (diff > 0) return "td-diff-up";
  if (diff < 0) return "td-diff-down";
  return "td-diff-same";
}

function diffSign(diff) {
  if (diff > 0) return `▲ ${diff}`;
  if (diff < 0) return `▼ ${Math.abs(diff)}`;
  return "— 0";
}

// 초기화 (위 DOMContentLoaded에서 처리)

function goToday() {
  document.getElementById("dateInput").value = todayStr();
  loadData();
}

async function loadData() {
  const date = document.getElementById("dateInput").value;
  if (!date) return;

  document.getElementById("loadingDiv").style.display = "block";
  document.getElementById("customerGrid").innerHTML = "";
  document.getElementById("summaryRow").innerHTML = "";
  document.getElementById("dateHeader").style.display = "none";
  document.getElementById("emptyDiv").style.display = "none";
  document.getElementById("noDataHint").style.display = "none";
  document.getElementById("loadBtn").disabled = true;

  try {
    const res = await fetch(`${API_BASE}/daily-compare?date=${date}`, {
      headers: authHeaders(),
    });
    if (res.status === 401) {
      alert("로그인 세션이 만료되었습니다. 다시 로그인해주세요.");
      window.location.href = "/";
      return;
    }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    render(data);
  } catch(e) {
    document.getElementById("emptyDiv").style.display = "block";
    document.getElementById("emptyDiv").innerHTML = `<div class="e-icon">⚠</div><p>오류: ${e.message}</p>`;
  } finally {
    document.getElementById("loadingDiv").style.display = "none";
    document.getElementById("loadBtn").disabled = false;
  }
}

function render(data) {
  const { target_date, prev_date, customers } = data;

  // 날짜 헤더
  document.getElementById("prevDateTag").textContent  = `전일 ${fmtDate(prev_date)}`;
  document.getElementById("todayDateTag").textContent = `금일 ${fmtDate(target_date)}`;
  document.getElementById("dateHeader").style.display = "flex";

  if (!customers || customers.length === 0) {
    document.getElementById("noDataHint").style.display = "block";
    document.getElementById("emptyDiv").style.display = "block";
    return;
  }

  // 전체 요약
  const totalToday = customers.reduce((s, c) => s + c.today_qty, 0);
  const totalPrev  = customers.reduce((s, c) => s + c.prev_qty, 0);
  const totalDiff  = totalToday - totalPrev;
  const upCnt   = customers.filter(c => c.diff > 0).length;
  const downCnt = customers.filter(c => c.diff < 0).length;
  const sameCnt = customers.filter(c => c.diff === 0).length;

  document.getElementById("summaryRow").innerHTML = `
    <div class="s-chip chip-total">
      <span class="s-label">금일 총 판매</span>
      <span class="s-val">${totalToday.toLocaleString()}</span>
      <span class="s-diff" style="color:var(--text3)">전일 ${totalPrev.toLocaleString()}</span>
    </div>
    <div class="s-chip ${totalDiff >= 0 ? 'chip-up' : 'chip-down'}">
      <span class="s-label">전일대비</span>
      <span class="s-val">${totalDiff >= 0 ? '▲' : '▼'} ${Math.abs(totalDiff).toLocaleString()}</span>
      <span class="s-diff">${totalToday && totalPrev ? (((totalToday-totalPrev)/totalPrev)*100).toFixed(1)+'%' : '-'}</span>
    </div>
    <div class="s-chip chip-total">
      <span class="s-label">거래처 수</span>
      <span class="s-val">${customers.length}</span>
      <span class="s-diff" style="color:var(--text3)">플랫폼</span>
    </div>
    <div class="s-chip chip-up">
      <span class="s-label">증가</span>
      <span class="s-val">${upCnt}</span>
      <span class="s-diff">거래처</span>
    </div>
    <div class="s-chip chip-down">
      <span class="s-label">감소</span>
      <span class="s-val">${downCnt}</span>
      <span class="s-diff">거래처</span>
    </div>
  `;

  // 거래처 카드
  const grid = document.getElementById("customerGrid");
  grid.innerHTML = "";

  customers.forEach((c, idx) => {
    const card = document.createElement("div");
    card.className = "c-card";
    card.innerHTML = `
      <div class="c-header" onclick="toggleCard(this)">
        <span class="c-name">${c.customer_name}</span>
        <div class="c-stats">
          <div class="c-stat">
            <div class="s-l">전일</div>
            <div class="s-v prev-v">${c.prev_qty.toLocaleString()}</div>
          </div>
          <div class="c-stat">
            <div class="s-l">금일</div>
            <div class="s-v today-v">${c.today_qty.toLocaleString()}</div>
          </div>
          <div class="c-stat">
            ${diffText(c.diff)}
          </div>
        </div>
        <span class="c-arrow">▶</span>
      </div>
      <div class="c-body">
        <table class="item-table">
          <thead>
            <tr>
              <th>품목코드</th>
              <th>품명</th>
              <th style="text-align:right">전일</th>
              <th style="text-align:right">금일</th>
              <th style="text-align:right">전일대비</th>
            </tr>
          </thead>
          <tbody>
            ${c.items.map(it => `
              <tr>
                <td class="code">${it.item_code}</td>
                <td>${it.item_name}</td>
                <td class="num td-prev">${it.prev_qty || '-'}</td>
                <td class="num td-today">${it.today_qty || '-'}</td>
                <td class="num ${diffClass(it.diff)}">${diffSign(it.diff)}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
    `;
    // 첫 번째 카드는 자동으로 열기
    if (idx === 0) card.classList.add("open");
    grid.appendChild(card);
  });
}

function toggleCard(header) {
  header.parentElement.classList.toggle("open");
}

// ── 이카운트 자동 수집 ──
async function fetchEcount() {
  const btn = document.getElementById("collectBtn");
  const statusEl = document.getElementById("collectStatus");
  const icon = document.getElementById("collectIcon");

  btn.disabled = true;
  icon.textContent = "⏳";
  setCollectStatus("show", "수집 요청 중...");

  try {
    const res = await fetch(`${API_BASE}/fetch-ecount`, {
      method: "POST",
      headers: authHeaders(),
    });
    if (res.status === 401) {
      alert("로그인 세션이 만료되었습니다. 다시 로그인해주세요.");
      window.location.href = "/";
      return;
    }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    // 폴링으로 완료 여부 확인
    await pollFetchStatus();
  } catch(e) {
    statusEl.classList.remove("show");
    alert("수집 요청 실패: " + e.message);
  } finally {
    btn.disabled = false;
    icon.textContent = "⚡";
  }
}

function setCollectStatus(action, text) {
  const el = document.getElementById("collectStatus");
  if (action === "show") {
    el.innerHTML = `<span class="mini-spinner"></span> ${text}`;
    el.classList.add("show");
  } else if (action === "ok") {
    el.innerHTML = `✅ ${text}`;
    el.style.color = "var(--success)";
    el.style.borderColor = "rgba(0,194,122,.3)";
    el.classList.add("show");
    setTimeout(() => { el.classList.remove("show"); el.style.color=""; el.style.borderColor=""; }, 4000);
  } else if (action === "err") {
    el.innerHTML = `❌ ${text}`;
    el.style.color = "var(--danger)";
    el.style.borderColor = "rgba(255,71,87,.3)";
    el.classList.add("show");
    setTimeout(() => { el.classList.remove("show"); el.style.color=""; el.style.borderColor=""; }, 6000);
  } else {
    el.classList.remove("show");
  }
}

async function pollFetchStatus() {
  // 수집 시작 전 현재 최신 log ID 저장
  let startId = -1;
  try {
    const init = await fetch(`${API_BASE}/fetch-status`, { headers: authHeaders() });
    if (init.ok) {
      const d = await init.json();
      startId = d.id || -1;
    }
  } catch(e) {}

  const maxTries = 40;  // 최대 80초
  for (let i = 0; i < maxTries; i++) {
    await sleep(2000);
    try {
      const res = await fetch(`${API_BASE}/fetch-status`, { headers: authHeaders() });
      if (!res.ok) continue;
      const d = await res.json();

      // 아직 이전 id거나 새 항목이 없으면 대기
      if (!d.id || d.id <= startId) {
        setCollectStatus("show", `ERP 연결 중... (${(i+1)*2}초)`);
        continue;
      }

      // 새 log 항목 생성됨 → 상태 확인
      if (d.status === "running") {
        setCollectStatus("show", `수집 중... ${d.message || ""}`);
      } else if (d.status === "success") {
        setCollectStatus("ok", `수집 완료 (${d.rows_imported || 0}행)`);
        await loadData();
        return;
      } else if (d.status === "error") {
        setCollectStatus("err", `수집 실패: ${d.message || "원인 불명"}`);
        return;
      }
    } catch(e) {}
  }
  setCollectStatus("err", "시간 초과 — 서버 로그를 확인해주세요");
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
</body>
</html>
